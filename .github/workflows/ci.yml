name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cd runner && cargo fmt --check --all

  lint:
    name: Clippy Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cd runner && cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cd runner && cargo test --workspace

  semver:
    name: SemVer Check (agi4-core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cd runner && cargo install cargo-semver-checks && cargo semver-checks --package agi4-core

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cd runner && cargo install cargo-audit && cargo audit

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: ./runner/Cargo.toml

  schema-validation:
    name: Schema Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cd runner && cargo test -p agi4-schema --tests -- --nocapture

  adapter-fixtures:
    name: Adapter Fixture Round-trips
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cd runner && cargo test -p agi4-adapters --tests

  adapter-fixture-validation:
    name: Adapter Fixture Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify each adapter has fixtures and tests
        run: |
          set -e
          # Define all adapters
          adapters=("metr" "arc-prize" "hle" "gpqa-diamond" "gdpval" "rli" "apex-agents" "osworld" "re-bench" "swe-bench")

          for adapter in "${adapters[@]}"; do
            # Convert kebab-case to snake_case for file names
            file_adapter=$(echo "$adapter" | sed 's/-/_/g')

            # Check that adapter has fixtures directory
            if [ ! -d "runner/tests/fixtures/$adapter" ]; then
              echo "ERROR: $adapter adapter missing fixtures directory"
              exit 1
            fi

            # Check that at least one fixture file exists
            if [ -z "$(ls runner/tests/fixtures/$adapter/*.json 2>/dev/null)" ]; then
              echo "ERROR: $adapter adapter has no fixture JSON files"
              exit 1
            fi

            # Verify all fixture files are valid JSON
            for fixture in runner/tests/fixtures/$adapter/*.json; do
              if ! jq . "$fixture" > /dev/null 2>&1; then
                echo "ERROR: $fixture is not valid JSON"
                exit 1
              fi
            done

            # Check that adapter source file exists
            if [ ! -f "runner/crates/agi4-adapters/src/${file_adapter}.rs" ]; then
              echo "ERROR: $adapter adapter source file missing"
              exit 1
            fi

            # Check for round-trip test in adapter source
            if ! grep -q "round.trip\|fn.*_round_trip" "runner/crates/agi4-adapters/src/${file_adapter}.rs"; then
              echo "ERROR: $adapter adapter missing round-trip test"
              exit 1
            fi

            echo "✓ $adapter adapter has fixtures and round-trip tests"
          done
          echo "✓ All 10 adapters have fixtures and round-trip tests"

  spec-traceability:
    name: Spec-to-Code Traceability
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify threshold constants are referenced
        run: |
          cd runner/crates/agi4-core
          # Check that every threshold constant in threshold.rs is referenced in evaluations
          set -e
          grep -oP 'pub const \K\w+' src/threshold.rs | while read const; do
            count=$(grep -r "$const" src/ | grep -v "pub const" | wc -l)
            if [ "$count" -eq 0 ]; then
              echo "ERROR: Threshold constant $const is not referenced in evaluation code"
              exit 1
            fi
          done

  all-checks-pass:
    name: All Checks Pass
    needs: [format, lint, test, semver, security-audit, deny, schema-validation, adapter-fixtures, adapter-fixture-validation, spec-traceability]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Decide based on results
        run: |
          if [[ "${{ needs.format.result }}" != "success" || \
                "${{ needs.lint.result }}" != "success" || \
                "${{ needs.test.result }}" != "success" || \
                "${{ needs.semver.result }}" != "success" || \
                "${{ needs.security-audit.result }}" != "success" || \
                "${{ needs.deny.result }}" != "success" || \
                "${{ needs.schema-validation.result }}" != "success" || \
                "${{ needs.adapter-fixtures.result }}" != "success" || \
                "${{ needs.adapter-fixture-validation.result }}" != "success" || \
                "${{ needs.spec-traceability.result }}" != "success" ]]; then
            echo "One or more checks failed"
            exit 1
          fi
          echo "All checks passed!"
