repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: end-of-file-fixer
        name: Fix end of file
      - id: check-yaml
        name: Check YAML
      - id: check-json
        name: Check JSON
      - id: check-toml
        name: Check TOML
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: check-case-conflict
        name: Check for case conflicts
      - id: mixed-line-ending
        name: Mixed line ending

  # Rust formatting
  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
        name: Rust fmt
        entry: bash -c 'cd runner && cargo fmt --all'
        language: system
        types: [rust]
        pass_filenames: false
      - id: clippy
        name: Rust clippy
        entry: bash -c 'cd runner && cargo clippy --all-targets --all-features -- -D warnings'
        language: system
        types: [rust]
        pass_filenames: false
        stages: [commit]

  # Cargo checks (local hooks)
  - repo: local
    hooks:
      - id: audit
        name: Cargo audit
        entry: bash -c 'cd runner && cargo audit'
        language: system
        pass_filenames: false
        stages: [commit]
      - id: semver
        name: Semver check (agi4-core)
        entry: bash -c 'cd runner && cargo semver-checks --package agi4-core'
        language: system
        pass_filenames: false
        stages: [commit]

  # Commit message linting
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.12.0
    hooks:
      - id: commitizen
        name: Commit message convention
        stages: [commit-msg]

exclude: ^(runner/target|\.cargo|\.claude)
fail_fast: false
