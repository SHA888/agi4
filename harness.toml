[project]
name = "agi4"
description = "AGI/4 attestation protocol and reference runner"
version = "0.1.0"

[harness]
version = "4.10.0"
type = "rust"

[build]
type = "cargo"

[test]
command = "cargo test --workspace"

[lint]
command = "cargo clippy --all-targets --all-features -- -D warnings"

[fmt]
command = "cargo fmt --check"
